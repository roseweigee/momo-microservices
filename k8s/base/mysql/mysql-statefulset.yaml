# =============================================================
# mysql.yaml
# 包含: mysql-user, mysql-order, mysql-shipping, mysql-inventory
# 全部改成 StatefulSet
# =============================================================

---
# ── mysql-user ───────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-user
  namespace: momo-system
spec:
  serviceName: mysql-user
  replicas: 1
  selector:
    matchLabels:
      app: mysql-user
  template:
    metadata:
      labels:
        app: mysql-user
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: momo-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: userdb
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: momo-secret
                  key: USER_DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: momo-secret
                  key: USER_DB_PASS
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -p$(MYSQL_ROOT_PASSWORD)
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: init-sql
          configMap:
            name: mysql-user-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-user
  namespace: momo-system
spec:
  selector:
    app: mysql-user
  ports:
    - port: 3306
      targetPort: 3306



# ── user-service Deployment ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: momo-system
  labels:
    app: user-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 最多多長出幾個新 Pod（超過 replicas 的數量）
      maxUnavailable: 0  # 部署期間最多允許幾個 Pod 不可用（0 = 零停機）
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      # ✅ initContainer：等 mysql-user ready 才啟動
      initContainers:
        - name: wait-for-mysql
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nc -z mysql-user 3306; do
                echo "Waiting for mysql-user..."
                sleep 3
              done
              echo "mysql-user is ready!"
          imagePullSecrets:
            - name: ghcr-secret
      containers:
        - name: user-service
          image: ghcr.io/roseweigee/momo-microservices/user-service:cc932b3
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: momo-secret
                  key: USER_DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: momo-secret
                  key: USER_DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: momo-secret
                  key: USER_DB_PASS
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: momo-config
                  key: KEYCLOAK_ISSUER_URI
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: momo-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_SERVICE_NAME
              value: "user-service"
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 10    # 加這行，給 100 秒緩衝
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 180  # 比 readiness 晚一點
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
# ── user-service Service ─────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: momo-system
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
---
# ── user-service HPA ─────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: momo-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

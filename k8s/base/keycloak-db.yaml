# =============================================================
# keycloak-db.yaml
# PostgreSQL for Keycloak
# 包含: Secret, PersistentVolumeClaim, Deployment, Service
# =============================================================

---
# 1. Secret - DB 帳密
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  namespace: momo-system
type: Opaque
stringData:
  POSTGRES_PASSWORD: keycloak_secret
  KC_DB_PASSWORD: keycloak_secret

---
# 2. PersistentVolumeClaim - DB 資料持久化
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-db-pvc
  namespace: momo-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# 3. PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-db
  namespace: momo-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak-db
  template:
    metadata:
      labels:
        app: keycloak-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: keycloak
            - name: POSTGRES_USER
              value: keycloak
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "keycloak"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: keycloak-db-pvc

---
# 4. PostgreSQL Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  namespace: momo-system
spec:
  selector:
    app: keycloak-db
  ports:
    - port: 5432
      targetPort: 5432

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: momo

  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/momo-microservices
    targetRevision: main
    path: k8s/base
    # 只同步 user-service 相關資源
    kustomize:
      commonLabels:
        app.kubernetes.io/managed-by: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: momo-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true  # 只 apply 有變更的資源，加速同步

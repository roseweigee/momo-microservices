apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: momo-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/roseweigee/momo-microservices
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

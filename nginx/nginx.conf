events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream user_backend       { server user-service:8081; }
    upstream order_backend      { server order-service:8082; }
    upstream shipping_backend   { server shipping-service:8083; }
    upstream payment_backend    { server payment-service:8084; }
    upstream inventory_backend  { server inventory-service:8085; }
    upstream box_backend        { server box-calculation-service:8086; }

    server {
        listen 80;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location /api/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://user_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/orders {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/orders/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://payment_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/shipping/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://shipping_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/inventory/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://inventory_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/box/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://box_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Actuator health via gateway
        location /health/user       { proxy_pass http://user_backend/actuator/health; proxy_set_header Host localhost; }
        location /health/order      { proxy_pass http://order_backend/actuator/health; proxy_set_header Host localhost; }
        location /health/payment    { proxy_pass http://payment_backend/actuator/health; proxy_set_header Host localhost; }
        location /health/shipping   { proxy_pass http://shipping_backend/actuator/health; proxy_set_header Host localhost; }
        location /health/inventory  { proxy_pass http://inventory_backend/actuator/health; proxy_set_header Host localhost; }
        location /health/box        { proxy_pass http://box_backend/actuator/health; proxy_set_header Host localhost; }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"Too Many Requests"}';
        }
    }
}

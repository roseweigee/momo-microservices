apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: momo-services
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/roseweigee/momo-microservices
    targetRevision: main
    path: k8s/base/services
  destination:
    server: https://kubernetes.default.svc
    namespace: momo-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

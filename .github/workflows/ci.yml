name: CI/CD Pipeline

on:
  push:
    branches: [ feature/gke-deployment ]
  pull_request:
    branches: [ feature/gke-deployment ]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:

  # ── Job 1: 偵測哪個服務有改動 ───────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      user-service: ${{ steps.changes.outputs.user-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || git show --name-only --format="" HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -q "^user-service/"; then
            echo "user-service=true" >> $GITHUB_OUTPUT
          else
            echo "user-service=false" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: user-service ─────────────────────────
  build-user-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.user-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test
        run: cd user-service && mvn clean verify -DskipTests=false

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR
        run: cd user-service && mvn clean package -DskipTests

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/user-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update K8s manifest
        if: github.event_name == 'push'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPO }}/user-service:${GITHUB_SHA::7}"
          sed -i "s|image: .*user-service.*|image: ${IMAGE}|g" k8s/base/user-service.yaml
          sed -i "s|image: .*user-service.*|image: ${IMAGE}|g" k8s/gke/user-service.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/user-service.yaml k8s/gke/user-service.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci: update user-service image to ${GITHUB_SHA::7} [skip ci]"
          git push

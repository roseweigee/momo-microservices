          git add k8s/base/payment-service.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci: update payment-service image to ${{ steps.meta.outputs.version }} [skip ci]"
          git push

  # ── Job 6: inventory-service ─────────────────────
  build-inventory-service:
    needs: detect-changes

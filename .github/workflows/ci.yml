name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:

  # ── Job 1: 偵測哪個服務有改動 ───────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      user-service:     ${{ steps.changes.outputs.user-service }}
      order-service:    ${{ steps.changes.outputs.order-service }}
      shipping-service:       ${{ steps.changes.outputs.shipping-service }}
      payment-service:        ${{ steps.changes.outputs.payment-service }}
      inventory-service:      ${{ steps.changes.outputs.inventory-service }}
      box-calculation-service: ${{ steps.changes.outputs.box-calculation-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          # 取得本次 push 變更的檔案
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || git show --name-only --format="" HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # 判斷各服務是否有改動
          if echo "$CHANGED" | grep -q "^user-service/"; then
            echo "user-service=true" >> $GITHUB_OUTPUT
          else
            echo "user-service=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^order-service/"; then
            echo "order-service=true" >> $GITHUB_OUTPUT
          else
            echo "order-service=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^shipping-service/"; then
            echo "shipping-service=true" >> $GITHUB_OUTPUT
          else
            echo "shipping-service=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^payment-service/"; then
            echo "payment-service=true" >> $GITHUB_OUTPUT
          else
            echo "payment-service=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^inventory-service/"; then
            echo "inventory-service=true" >> $GITHUB_OUTPUT
          else
            echo "inventory-service=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q "^box-calculation-service/"; then
            echo "box-calculation-service=true" >> $GITHUB_OUTPUT
          else
            echo "box-calculation-service=false" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: user-service ─────────────────────────
  build-user-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.user-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test
        run: cd user-service && mvn clean verify -DskipTests=false

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR
        run: cd user-service && mvn clean package -DskipTests

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/user-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update K8s manifest
        if: github.event_name == 'push'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPO }}/user-service:${{ steps.meta.outputs.version }}"
          sed -i "s|image: .*user-service.*|image: ${IMAGE}|g" k8s/base/user-service.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/user-service.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci: update user-service image to ${{ steps.meta.outputs.version }} [skip ci]"
          git push

  # ── Job 3: order-service ────────────────────────
  build-order-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.order-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test
        run: cd order-service && mvn clean verify -DskipTests=false

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR
        run: cd order-service && mvn clean package -DskipTests

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/order-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update K8s manifest
        if: github.event_name == 'push'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPO }}/order-service:${{ steps.meta.outputs.version }}"
          sed -i "s|image: .*order-service.*|image: ${IMAGE}|g" k8s/base/order-service.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/order-service.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci: update order-service image to ${{ steps.meta.outputs.version }} [skip ci]"
          git push

  # ── Job 4: shipping-service ─────────────────────
  build-shipping-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.shipping-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:

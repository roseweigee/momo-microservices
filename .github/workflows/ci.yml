          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR
        run: cd shipping-service && mvn clean package -DskipTests

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/shipping-service
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./shipping-service
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update K8s manifest
        if: github.event_name == 'push'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPO }}/shipping-service:${{ steps.meta.outputs.version }}"
          sed -i "s|image: .*shipping-service.*|image: ${IMAGE}|g" k8s/base/shipping-service.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/shipping-service.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci: update shipping-service image to ${{ steps.meta.outputs.version }} [skip ci]"
          git push

  # ── Job 5: payment-service ──────────────────────
  build-payment-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.payment-service == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build JAR
        run: cd payment-service && mvn clean package -DskipTests
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}/payment-service
          tags: |

version: '3.8'

services:

  # ── Infrastructure ──────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - momo-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - momo-net

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - momo-net

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    networks:
      - momo-net

  # ── 每個服務獨立 MySQL DB ────────────────────────

  mysql-user:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: userdb
      MYSQL_USER: user_svc
      MYSQL_PASSWORD: user_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql-user-data:/var/lib/mysql
      - ./sql/user-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - momo-net

  mysql-order:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orderdb
      MYSQL_USER: order_svc
      MYSQL_PASSWORD: order_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql-order-data:/var/lib/mysql
      - ./sql/order-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - momo-net

  mysql-shipping:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shippingdb
      MYSQL_USER: shipping_svc
      MYSQL_PASSWORD: shipping_pass
    ports:
      - "3309:3306"
    volumes:
      - mysql-shipping-data:/var/lib/mysql
      - ./sql/shipping-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - momo-net

  # ── Microservices ────────────────────────────────

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-user:3306/userdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: user_svc
      SPRING_DATASOURCE_PASSWORD: user_pass
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/momo-realm
    depends_on:
      - mysql-user
      - keycloak
    networks:
      - momo-net

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-order:3306/orderdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: order_svc
      SPRING_DATASOURCE_PASSWORD: order_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/momo-realm
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      - mysql-order
      - kafka
      - redis
      - keycloak
      - user-service
    networks:
      - momo-net

  shipping-service:
    build: ./shipping-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-shipping:3306/shippingdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: shipping_svc
      SPRING_DATASOURCE_PASSWORD: shipping_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/momo-realm
    depends_on:
      - mysql-shipping
      - kafka
      - keycloak
    networks:
      - momo-net


  mysql-payment:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paymentdb
      MYSQL_USER: payment_svc
      MYSQL_PASSWORD: payment_pass
    ports:
      - "3310:3306"
    volumes:
      - mysql-payment-data:/var/lib/mysql
      - ./sql/payment-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - momo-net

  payment-service:
    build: ./payment-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-payment:3306/paymentdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: payment_svc
      SPRING_DATASOURCE_PASSWORD: payment_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/momo-realm
    depends_on:
      - mysql-payment
      - kafka
      - keycloak
    networks:
      - momo-net


  mysql-inventory:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventorydb
      MYSQL_USER: inventory_svc
      MYSQL_PASSWORD: inventory_pass
    ports:
      - "3311:3306"
    volumes:
      - mysql-inventory-data:/var/lib/mysql
      - ./sql/inventory-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - momo-net

  inventory-service:
    build: ./inventory-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inventory:3306/inventorydb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: inventory_svc
      SPRING_DATASOURCE_PASSWORD: inventory_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/momo-realm
    depends_on:
      - mysql-inventory
      - redis
      - kafka
      - keycloak
    networks:
      - momo-net

  box-calculation-service:
    build: ./box-calculation-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
    networks:
      - momo-net

  # ── Nginx API Gateway ────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - order-service
      - shipping-service
    networks:
      - momo-net

  # ── Observability ────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - momo-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - momo-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - momo-net


  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - momo-net

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - momo-net


networks:
  momo-net:
    driver: bridge

volumes:
  mysql-user-data:
  mysql-inventory-data:
  mysql-payment-data:
  mysql-order-data:
  mysql-shipping-data:
  grafana-data:

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8081']
    metrics_path: '/actuator/prometheus'

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8082']
    metrics_path: '/actuator/prometheus'

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8084']
    metrics_path: '/actuator/prometheus'

  - job_name: 'shipping-service'
    static_configs:
      - targets: ['shipping-service:8083']
    metrics_path: '/actuator/prometheus'

  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8085']
    metrics_path: '/actuator/prometheus'

  - job_name: 'box-calculation-service'
    static_configs:
      - targets: ['box-calculation-service:8086']
    metrics_path: '/actuator/prometheus'
